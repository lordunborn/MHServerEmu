GiftingAvatarLevelRequired=20
GiftingLoginCountRequired=5
InfinitySystemEnabled=true
ChatBanVoteAccountAgeInDaysRequired=7
ChatBanVoteAvatarLevelRequired=20
ChatBanVoteLoginCountRequired=5
IsDifficultySliderEnabled=true
OrbisTrophiesEnabled=true

[CustomGameOptions]
;             AutosaveIntervalMinutes: Determines the interval for saving player data when not transferring between regions. Set to <= 0 to disable autosaving.
;           ESCooldownOverrideMinutes: Overrides the default Eternity Splinter drop cooldown duration when the value is >= 0.
;                     CombineESStacks: Combine multiple Eternity Splinter stacks into a single item when they drop at the same time.
;                   AutoUnlockAvatars: Automatically unlocks all avatars for players who have finished the tutorial.
;                   AutoUnlockTeamUps: Automatically unlocks all team-ups for players who have finished the tutorial.
;      DisableMovementPowerChargeCost: Disables charge costs for movement powers to imitate pre-BUE behavior.
;               AllowSameGroupTalents: Allows mutually exclusive talents to be enabled at the same time.
;         EnableCreditChestConversion: Allows conversion of credits to sellable chest items via the !item creditchest command.
;     CreditChestConversionMultiplier: Cost multiplier for converting credits to chest items.
;                DisableInstancedLoot: Makes loot free-for-all, Diablo 2 style.
;             LootSpawnGridCellRadius: Affects the spacing of loot that drops [16-128].
; TrashedItemExpirationTimeMultiplier: Affects how long items trashed by players remain on the ground.
;               DisableAccountBinding: Disables account binding on pickup for items.
;             DisableCharacterBinding: Disables character binding on equip for items.
;             DisableMissionXPBonuses: Prevents mission experience rewards from being affected by experience bonuses.
;                UsePrestigeLootTable: Replaces starting costume prestige rewards with the loot table specified in game data.
;              EnableUltimatePrestige: Allows prestige level to be reset after reaching the prestige level cap.
;       ApplyHiddenPvPDamageModifiers: Enables hidden damage modifiers based on K/D ratio, match history, and Omega level in PvP combat.
;                EnableItemAutoPickup: Auto-pickup currency-style items (Eternity Splinters, Cube Shards, Runestones, all Marks, etc.) within ItemAutoPickupRadius. Off by default.
;                ItemAutoPickupRadius: Radius (in world units) around the avatar within which currency items are auto-picked-up. Default 400 matches the InteractRange.
;            ItemAutoPickupIntervalMs: Server-side scan interval in milliseconds. Lower = more responsive, slightly more CPU. Floor 50 ms.
;                   EnableLootFilters: Enables the '!filter' chat command system for Ring, Medal, and Insignia rarity-based filtering. On by default.
;  EnableCraftingIngredientAutoPickup: Auto-pickup nearby crafting ingredients (e.g. catalysts, crafting mats). Reuses ItemAutoPickupRadius.
; CraftingIngredientAutoPickupToStash: When enabled, crafting ingredients picked up automatically are sent to the stash instead of general inventory.
;               EnableGlyphAutoPickup: Auto-pickup nearby Runeword Glyphs (Entity/Items/Runewords/Glyphs/). Reuses ItemAutoPickupRadius.
;              GlyphAutoPickupToStash: When enabled, Glyphs picked up automatically are sent to the stash instead of general inventory.
;               EnableRelicAutoPickup: Auto-pickup nearby Relics (Entity/Items/Relics/Prototypes/). Reuses ItemAutoPickupRadius.
;              RelicAutoPickupToStash: When enabled, Relics picked up automatically are sent to the stash instead of general inventory.
; RelicAutoPickupEquipIfSameTypeEquipped: When enabled, a picked-up Relic stacks directly onto an already-equipped Relic of the same type instead of going to the stash/inventory.
;                  StashAffinityEnable: When enabled, manually moving an item into a stash tab is redirected to a better-matching stash tab (character-specific stash for bound/restricted items, or a tab whose custom display name matches the item's type, e.g. "Relic"/"Rune"/"Unique") if one exists and has space.
;           StashAffinityLoggingEnable: Logs every Stash Affinity redirect decision to Logs/StashAffinity/ for debugging. Off by default.
;                  PhantomHeroesEnable: Enables the '!phantom' command group (spawn/squad/costume/clear), which lets players summon AI-controlled hero companions that fight alongside them.
;      PhantomHeroesDespawnOnDeath: When enabled, phantoms take real damage and are despawned if they'd otherwise go down (they have no client to drive a revive flow). When disabled, phantoms are invulnerable instead.
;        PhantomGearItemBlacklist: Comma-separated list of item prototype name substrings to exclude from phantom gear rolls (e.g. artifacts that are no longer obtainable in-game, purely cosmetic, or have broken/placeholder icons). Case-insensitive. Empty by default. Does not require a rebuild to change, only a restart.
;           PhantomHeroesMaxActive: Maximum number of phantoms a single player can have active at once, across any number of spawn calls. Default 9 — a party/raid group is 10 total including the human caller.
;  PhantomHeroesDownedGracePeriodMs: How long (ms) a downed phantom stays revivable (like a real player's downed state) before it despawns if nobody revives it in time. Only applies when PhantomHeroesDespawnOnDeath is true. Default 30000 (30 seconds).
;     PhantomHeroesReviveCooldownMs: How long (ms) after a phantom revives the HUMAN player before another phantom-driven revive of the human can happen again. Does not apply to phantoms reviving other phantoms. Default 60000 (60 seconds).
;        DisableInteractiveThrowables: Completely disables the ability for players to pick up and throw objects.
;       AutoCancelThrowableOnPowerUse: When true, attempting to use any other power while holding a throwable will silently drop the object and allow the new power to proceed.
;            AutoThrowOnMovementPower: When true, activating a movement / travel power while holding a throwable will automatically throw it before starting movement.
;             EnableItemChestAutoOpen: Automatically opens chest items in the general inventory on a cooldown timer.
;         ItemChestAutoOpenCooldownMs: Milliseconds between each automatic chest opening. Minimum 500 ms.
;          ItemChestAutoOpenWhitelist: Comma-separated list of prototype name substrings that identify chests to auto-open.
;                     IncursionEnable: Master switch for the experimental invasion system. When on, a hostile invader (the "Skrull Imposter") hunts one assigned player per eligible patrol zone on a timer.
;              IncursionAllowedRegions: Comma-separated substrings matched against each region's FULL prototype path (e.g. "Regions/Sandbox/OriginalPatrols/Region1.prototype"). The automatic hunt system ONLY spawns in regions whose path contains one of these (case-insensitive) - empty means it spawns nowhere. Use a specific region's short name to allow just that one, or a shared folder segment (e.g. "OriginalPatrols") to allow every region under it at once. Does not affect manual !incursion commands. Does not require a rebuild to change, only a restart.
;                  IncursionIntervalMs: Milliseconds between invasion waves. Minimum 1000 ms.
;          IncursionRandomIntervalMaxMs: Maximum additional random milliseconds added to IncursionIntervalMs for each wave.
;              IncursionEnemyPrototype: Prototype name (full Calligraphy path) of the invader's COMBAT BODY (server-driven agent). Leave empty for the default proven boss. Playable avatars cannot be used.
;                                       NOTE: The client render skin (which avatar/costume the invader is drawn as) is NOT configurable. Each invasion enemy type (IncursionEnemy* subclass) defines its own avatar and costume, and one is picked at random per spawn.
;              IncursionLogVerboseEnable: When true, logs detailed per-tick/per-spawn invasion diagnostics to help debug the system.
;         IncursionCommandsRequireAdmin: When true, in-game '!incursion' commands require an admin account. Server console is always allowed.
;         IncursionLogAllDamageTargetsEnable: When true, logs incursion enemy damage dealt to ALL targets (turrets, NPCs, etc.). When false (default), only logs damage dealt to player avatars for cleaner tuning output.

AutosaveIntervalMinutes=15
ESCooldownOverrideMinutes=5
CombineESStacks=true
AutoUnlockAvatars=false
AutoUnlockTeamUps=false
DisableMovementPowerChargeCost=false
AllowSameGroupTalents=false
EnableCreditChestConversion=true
CreditChestConversionMultiplier=1.0
DisableInstancedLoot=false
LootSpawnGridCellRadius=20.0
TrashedItemExpirationTimeMultiplier=1.0
DisableAccountBinding=true
DisableCharacterBinding=false
DisableMissionXPBonuses=false
UsePrestigeLootTable=false
EnableUltimatePrestige=false
ApplyHiddenPvPDamageModifiers=false

; Loot Filters
EnableLootFilters=true

; Item Auto Pickup Settings
EnableItemAutoPickup=true
ItemAutoPickupRadius=1400.0
ItemAutoPickupIntervalMs=2500
EnableCraftingIngredientAutoPickup=true
CraftingIngredientAutoPickupToStash=true
EnableCraftingIngredientAutoPickupVerboseLogging=false
EnableGlyphAutoPickup=true
GlyphAutoPickupToStash=true
EnableRelicAutoPickup=true
RelicAutoPickupToStash=true
RelicAutoPickupEquipIfSameTypeEquipped=true

; Stash Affinity Settings
StashAffinityEnable=true
StashAffinityLoggingEnable=false

; Phantom Heroes Settings
PhantomHeroesEnable=true
PhantomHeroesDespawnOnDeath=true
PhantomHeroesMaxActive=9
PhantomGearItemBlacklist=
PhantomHeroesDownedGracePeriodMs=30000
PhantomHeroesReviveCooldownMs=60000

; interactive Throwables Settings
DisableInteractiveThrowables=true
AutoCancelThrowableOnPowerUse=false
AutoThrowOnMovementPower=false

; Chest Auto Open Settings
EnableItemChestAutoOpen=false
ItemChestAutoOpenCooldownMs=1000
ItemChestAutoOpenWhitelist=Chest,Crate,LootBox,Giftbox,GiftBox
EnableItemChestAutoOpenVerboseLogging=false

; Incursion Settings - spawns random Hero Variant invaders at random intervals - EXPERIMENTAL
; NOTE: the ini parser does NOT strip inline "key=value ; comment" comments - every value
; below must be on its own line with no trailing comment, or the trailing text becomes part
; of the parsed value (silently corrupting string lists and failing TryParse on numbers/bools).
; IncursionEnable: false by default so the automatic wave doesn't start the moment the server
; boots. Turn it on live with '!incursion start' (and off again with '!incursion stop') once
; you've given gamepad-only players a heads-up, rather than it running the instant you log in.
IncursionEnable=false
; IncursionIntervalMs: milliseconds between invasion waves (3 minutes minimum recommended)
IncursionIntervalMs=180000
; IncursionRandomIntervalMaxMs: additional random range added on top of IncursionIntervalMs (6 minutes here)
IncursionRandomIntervalMaxMs=360000
IncursionMaxActiveInvaders=10
; IncursionMaxLifetimeMs: 20 minutes
IncursionMaxLifetimeMs=1200000
; IncursionIdleTimeoutMs: 2 minutes
IncursionIdleTimeoutMs=120000
; IncursionDeathGracePeriodMs: controller kept alive this long after death because lingering DoTs still need to reference the damage scale
IncursionDeathGracePeriodMs=20000
; IncursionDeathVaporizeDelayMs: how long the body is visible in its "downed, awaiting
; resurrection" pose (the standard avatar death reaction) before it vaporizes and the
; death-reveal corpse appears. Lower = shorter kneel window, but too low may cut off the
; teleport-beam VFX before it reads clearly.
IncursionDeathVaporizeDelayMs=600
; IncursionEnemyDamageTakenMultiplier: incoming damage multiplier (goal = short lived but dangerous)
IncursionEnemyDamageTakenMultiplier=2.0
; IncursionEnemyVisualScale: visual size/bounds multiplier at spawn (1.0=normal, 1.5=50% larger)
IncursionEnemyVisualScale=1.5
; IncursionEnemyDamageMultiplier: final outgoing damage multiplier applied AFTER per-ability scale (1.0=no change, 1.5=+50%, 0.5=half)
; Set to 0.4 from a real 2026-07-15 log (Spiderman Invader vs a 3653-HP player): the invader's
; gross output that fight was 5189 (142% of the player's max health) against only 162 dealt back
; (10.8% of its own 1500-HP pool) - a 32:1 output ratio. 0.4 brings the invader's output down to
; roughly 57% of a typical player's health over a similar-length fight, leaving room to survive/heal.
IncursionEnemyDamageMultiplier=0.4
; IncursionMaxSingleHitPctOfTargetHealth: hard ceiling on a single hit from an invader to a
; player, as a fraction of the target's max health, applied AFTER every other damage multiplier.
; Every hero's kit has at least one outlier "ultimate"/execute power balanced for a level-60
; player to use against mob-tier health pools - this catches that outlier universally across all
; possible rogues instead of hand-tuning per-power scale for every hero's signature ability.
; 0.15 = no single hit can exceed 15% of the target's max health. 0 or negative disables the clamp.
IncursionMaxSingleHitPctOfTargetHealth=0.15
; IncursionEnemyHealthMaxOverride: fixed HP pool given to the invader body, replacing whatever its
; native mob-curve produces once CombatLevel is force-synced to the target player's level. The native
; curve was never tuned for a solo 1-on-1 fight, so it produces wildly inconsistent pools between
; chassis (thousands of HP at level 60) with no relation to a real player's actual damage output.
; This makes invader toughness a known, directly tunable number instead of a side effect of leveling.
; RogueNemesis rank multiplies this base value via RogueNemesisTiers.json's healthMult.
; 0 or negative disables the override and falls back to the native curve.
; Lowered from 1500 to 500 from the same 2026-07-15 log: the player only dealt 162 damage over
; the whole fight (10.8% of a 1500 pool) - 500 puts a full kill back within reach of that same
; real output instead of requiring ~9x more damage than was actually observed.
IncursionEnemyHealthMaxOverride=500
; IncursionExcludeEnemies: RasputinIV is the chimera experimental variant, animations not finished
IncursionExcludeEnemies=RasputinIV
; IncursionEnemyPrototype: empty defaults to a patrol boss base, with "half" health due to the damage-taken multiplier above
IncursionEnemyPrototype=
; IncursionAllowedRegions: matches Regions/EndGame/TierX/Patrol* and their AltRegions/ subfolders (path substring match)
IncursionAllowedRegions=PatrolBrooklyn,PatrolHightown,PatrolMidtown
; IncursionRecentlyHuntedCooldownMs: after an invader defeats its assigned target, that player
; is skipped when picking a new zone target for this long (anti spawn-camping). 5 minutes here.
IncursionRecentlyHuntedCooldownMs=300000
; IncursionDeathRevealMobPrototypes: comma-separated full prototype paths of the "true form"
; corpse left behind where an invader just vaporized (the Skrull-reveal twist). One is picked
; at random per death. Defaults to the Hand Ninja's own Skrull-corpse body.
IncursionDeathRevealMobPrototypes=Entity/Characters/Mobs/HandSkrull/HandSkrullNinjaBase.prototype
; IncursionCommandsRequireAdmin: true restricts '!incursion' commands to admin accounts
; (server console is always allowed regardless of this setting).
IncursionCommandsRequireAdmin=true
IncursionLoggingEnable=false
IncursionLogVerboseEnable=false
IncursionLogAllDamageTargetsEnable=false
; IncursionLogCollatorEnable: saves per-incursion fight log to file
IncursionLogCollatorEnable=false

; RogueNemesis Settings - per-player autonomous villain ambush system, drawn from Data/Game/RoguesGallery/RoguesGallery.json.
; Fully independent of Incursion - own enable switch, own tick, own cooldowns, never contends for
; the same region "one active invader" slot. Off by default; players opt in individually with
; '!rogue enable' once you turn the feature on server-wide.
; RogueNemesisEnable: master switch. false by default, same "off until you turn it on" posture as Incursion.
RogueNemesisEnable=false
; RogueNemesisCheckIntervalMs: how often (ms) each opted-in eligible player gets an ambush roll.
RogueNemesisCheckIntervalMs=60000
; RogueNemesisRollChance: chance [0.0-1.0] of an ambush on each check for an eligible player.
RogueNemesisRollChance=0.25
; RogueNemesisCooldownMs: after an encounter ends (all its invaders killed/despawned), how long
; before that player is eligible to be rolled again. 5 minutes here.
RogueNemesisCooldownMs=300000
; RogueNemesisMaxSpawns: how many invaders spawn together in a single encounter.
RogueNemesisMaxSpawns=1
; RogueNemesisExcludedRegions: comma-separated substrings matched against each region's FULL
; prototype path (same matching style as IncursionAllowedRegions). Hubs/Town regions are ALWAYS
; excluded regardless of this setting - this is for additional zones you want off-limits on top
; of that, e.g. raid instances. Empty by default (everywhere but hubs is allowed).
RogueNemesisExcludedRegions=
; RogueNemesisFollowDelayMs: when a hunted player changes to a non-safe zone, how long the
; invader takes to catch up and reappear off-screen in the new zone. 30 seconds here.
RogueNemesisFollowDelayMs=30000
; RogueNemesisTargetUnreachableTimeoutMs: when the hunted player's entity can't be resolved in
; this Game instance at all (mid-region-transfer loading screen, OR they crossed into a
; different Game instance the invader has no way to follow into, e.g. a hub) - how long to wait
; before giving up and ending the hunt. Too short risks mistaking an ordinary loading screen for
; the target being gone; too long leaves the invader stuck un-despawned in a still-live region,
; unable to re-engage even if the same player wanders back later. 1 minute here.
RogueNemesisTargetUnreachableTimeoutMs=60000
; RogueNemesisRankWeightMultiplier: how much a player's existing Nemesis history biases which
; villain gets picked for their next encounter. Each Nemesis rank (1-5, still undefeated) adds
; this much extra weight relative to a fresh villain with no history - higher means an active
; Nemesis comes back far more often than a random rogue; 0 disables the bias entirely (uniform
; random pick, same as before Nemesis tracking existed).
RogueNemesisRankWeightMultiplier=2.0
; RogueNemesisCuratedRogueWeightShare: RoguesGallery.json's heroRogues/villainHunters curated
; lists (e.g. Thor -> Loki) are no longer the ENTIRE pool - they're unioned with the wider
; fallback pool, and this is the share of pick weight (0.0-1.0) the curated entries collectively
; get at baseline (no Nemesis rank history yet). 0.7 = 70% chance the next encounter comes from
; the curated list, 30% from the rest of the fallback pool - so Thor mostly fights Loki but isn't
; locked to only ever fighting Loki. Actual odds shift from this baseline as Nemesis rank history
; (RogueNemesisRankWeightMultiplier above) builds up on other villains. 1.0 = old "curated list
; only, if one exists" behavior; 0.0 = curated entries are effectively never picked (all weight
; goes to the rest of the fallback pool).
RogueNemesisCuratedRogueWeightShare=0.7
; RogueNemesisTier5DefeatCooldownEnable: after a player defeats a rank-5 (Tier 5) Nemesis, that
; specific villain won't spawn for them again until the next daily reset (see
; RogueNemesisTier5DefeatCooldownResetHour) - stops endless same-day rank-5 loot farming without
; touching the fight itself or any other rank. Only checked on the natural ambush roll; '!rogue
; forcespawn' always bypasses it (same as it already bypasses the regular post-encounter
; cooldown), so admin testing is unaffected. Set false to disable entirely for testing.
RogueNemesisTier5DefeatCooldownEnable=true
; RogueNemesisTier5DefeatCooldownResetHour: local server-clock hour (0-23) the daily rank-5 defeat
; cooldown resets at. Defeating a rank-5 Nemesis makes it unavailable until the next time the
; server clock crosses this hour - so a kill right before reset barely waits, one right after
; waits almost a full day. 6 (6 AM) here.
RogueNemesisTier5DefeatCooldownResetHour=6
; RogueNemesisCommandsRequireAdmin: gates admin/diagnostic '!rogue' subcommands only - the
; player-facing enable/disable toggle always works regardless of this setting.
RogueNemesisCommandsRequireAdmin=true
RogueNemesisLoggingEnable=false
RogueNemesisLogVerboseEnable=false

[MTXStore]
; GazillioniteBalanceForNewAccounts: The amount of Gs new accounts will get when they log in for the first time.
;   ESToGazillioniteConversionRatio: The amount of Gs players will get for each Eternity Splinter when converting them.
;    ESToGazillioniteConversionStep: Step for the Eternity Splinter amount when converting to G. Used to avoid rounding errors.
;         GiftingOmegaLevelRequired: Minimum Omega level required to purchase gifts for other players (if Omega is enabled).
;      GiftingInfinityLevelRequired: Minimum Infinity level required to purchase gifts for other players (if Infinity is enabled).
;                       HomePageUrl: URL for the page displayed on the Home tab.
;                 HomeBannerPageUrl: URL for the top banner displayed when the Home tab is selected.
;               HeroesBannerPageUrl: URL for the top banner displayed when the Heroes tab is selected.
;             CostumesBannerPageUrl: URL for the top banner displayed when the Costumes tab is selected.
;               BoostsBannerPageUrl: URL for the top banner displayed when the Items tab is selected.
;               ChestsBannerPageUrl: URL for the top banner displayed when the Cards tab is selected.
;             SpecialsBannerPageUrl: URL for the top banner displayed when the Specials tab is selected.
;                      RealMoneyUrl: URL for the page displayed in the add G window.
;         RewriteOriginalBundleUrls: When enabled, rewrites original bundle URLs pointing to the Gazillion CDN with new prefixes.
;                     BundleInfoUrl: URL used to rewrite Gazillion bundle info URLs (if enabled).
;                    BundleImageUrl: URL used to rewrite Gazillion bundle image URLs (if enabled).

GazillioniteBalanceForNewAccounts=5000
ESToGazillioniteConversionRatio=5
ESToGazillioniteConversionStep=4
GiftingOmegaLevelRequired=0
GiftingInfinityLevelRequired=0
HomePageUrl=http://localhost/store/index.html
HomeBannerPageUrl=http://localhost/store/images/banner.png
HeroesBannerPageUrl=http://localhost/store/images/banner.png
CostumesBannerPageUrl=http://localhost/store/images/banner.png
BoostsBannerPageUrl=http://localhost/store/images/banner.png
ChestsBannerPageUrl=http://localhost/store/images/banner.png
SpecialsBannerPageUrl=http://localhost/store/images/banner.png
RealMoneyUrl=https://localhost/MTXStore/AddG
RewriteOriginalBundleUrls=true
BundleInfoUrl=http://localhost/bundles/
BundleImageUrl=http://localhost/bundles/images/

[Leaderboards]
;            DatabaseFile: Name of the SQLite database file to use relative to the server's Data/Leaderboards directory.
;            ScheduleFile: Name of the JSON schedule file to use relative to the server's Data/Leaderboards directory
; AutoSaveIntervalMinutes: The minimum interval in minutes between leaderboard entry autosaves to the database.

DatabaseFile=Leaderboards.db
